version: "3.9"
services:

  node-application:
    build: .
    container_name: node-application
    ports:
      - "8080:3000"
    restart: always
    depends_on:
      - mongo
    environment:
      - DATABASE=mongodb://mongo:27017/lab3db
      - PORT=3000

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27018:27017"
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
